name: Cold Start Warm-up

on:
  # Keep-alive is handled by cron-job.org instead — GitHub Actions' schedule
  # trigger is best-effort and can queue up delayed/bursty runs, which
  # collided with cron-job.org's pings and tripped Cloudflare's 429s.
  # This is left as a manual/backup trigger only.
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend
        run: curl -sf https://dotnetcoffeeshopbackend.onrender.com/ping
