name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CoffeeShop.sln

      - name: Build
        run: dotnet build CoffeeShop.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test CoffeeShopApi.Tests/CoffeeShopApi.Tests.csproj --no-build --configuration Release --verbosity normal
