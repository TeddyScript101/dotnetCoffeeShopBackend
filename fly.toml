# fly.toml app configuration file generated for coffeeshopapi on 2026-05-29T21:38:39+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'coffeeshopapi'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
